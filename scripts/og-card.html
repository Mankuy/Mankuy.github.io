<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,900&family=Space+Grotesk:wght@400;500&family=Space+Mono&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background:
        linear-gradient(155deg, #f8f4ea 0%, #f5f0e6 40%, #e6e0d4 100%);
      color: #1a1a1a;
      position: relative;
    }
    .grain {
      position: absolute;
      inset: 0;
      opacity: 0.06;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      pointer-events: none;
    }
    .frame {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      padding: 56px 72px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .kicker {
      font-family: 'Space Mono', monospace;
      font-size: 18px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #e63946;
    }
    .eyebrow {
      margin-top: 14px;
      font-size: 26px;
      line-height: 1.35;
      color: #4a4a4a;
      max-width: 28ch;
    }
    .masthead {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 108px;
      font-weight: 900;
      line-height: 0.88;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      text-shadow: 3px 3px 0 rgba(230, 57, 70, 0.12);
    }
    .hook {
      margin-top: 28px;
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-size: 34px;
      line-height: 1.25;
      max-width: 22ch;
      border-left: 4px solid #e63946;
      padding-left: 20px;
      color: #2a2a2a;
    }
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      font-family: 'Space Mono', monospace;
      font-size: 18px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #5a5a5a;
    }
    .stamp {
      padding: 8px 14px;
      border: 2px solid #1a1a1a;
      transform: rotate(-3deg);
      font-size: 16px;
      font-weight: 700;
    }
    .accent {
      position: absolute;
      right: 64px;
      top: 50%;
      transform: translateY(-50%);
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(230, 57, 70, 0.14) 0%, transparent 70%);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  <div class="accent" aria-hidden="true"></div>
  <div class="frame">
    <header>
      <p class="kicker">Fanzine Nº1 · Construí esto</p>
      <p class="eyebrow">Para cada problema, una solución a tu medida.</p>
    </header>
    <main>
      <h1 class="masthead">Facundo Galetta</h1>
      <p class="hook">El psicólogo que audita tu mente — y te construye la salida.</p>
    </main>
    <footer class="footer">
      <span>Montevideo · 2026</span>
      <span class="stamp">GRATIS · Nº1</span>
    </footer>
  </div>
</body>
</html>
